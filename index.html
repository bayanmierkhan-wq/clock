<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock App</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .container{
            position: relative;
        }

        img{
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }

        p{
            color: white;
            position: absolute;
            top: 80px;
            left: 40px;
            font-size: 20px;
        }

        h3{
            color: white;
            position: absolute;
            bottom: 230px;
            left: 45px;
            font-size: 25px;
        }

        h1{
            color: white;
            font-size: 100px;
            position: absolute;
            bottom: 80px;
            left: 40px;
        }

        h2{
            color: white;
            position: absolute;
            bottom: 60px;
            left: 50px;
        }

        button{
            width: 130px;
            height: 50px;
            border-radius: 35px;
            border: none;
            cursor: pointer;
            position: absolute;
            right: 50px;
            bottom: 60px;
            font-size: 16px;
        }

        a{
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="photo.jpg" alt="">

        <p>
            "The science of operations, as derived from mathematics more <br>
            especially, is a science of itself, and has its own abstract truth <br>
            and value"
        </p>

        <h3 id="greeting">GOOD MORNING</h3>

        <h1 id="clock">00:00:00</h1>

        <h2>IN LONDON, UK</h2>

        <button>
            <a href="http://127.0.0.1:5500/index1.html">MORE</a>
        </button>

    </div>

    <script>

        function updateClock() {

            let now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("clock").innerHTML =
                hours + ":" + minutes + ":" + seconds ;

            let greeting = "";

            if(hours < 12){
                greeting = " GOOD MORNING, IT’S CURRENTLY";
            }
            else if(hours < 18){
                greeting = " GOOD AFTERNOON, IT’S CURRENTLY";
            }
            else{
                greeting = " GOOD EVENING, IT’S CURRENTLY";
            }

            document.getElementById("greeting").innerHTML = greeting;
        }

        setInterval(updateClock, 1000);

        updateClock();

    </script>

</body>
</html>
