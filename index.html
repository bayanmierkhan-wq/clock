<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            overflow: hidden;
            margin: 0;
        }
        img{
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
        .container{
            position: relative;
        }
        p{
            position: absolute;
            color: white;
            top: 80px;
            left: 40px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 25px;
        }
        h3{
            color: white;
            position: absolute;
            bottom: 230px;
            left: 45px;
            font-size: 25px;
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            color: white;
            font-size: 100px;
            position: absolute;
            bottom: 80px;
            left: 40px;
            font-family: Arial, Helvetica, sans-serif;
        }
        h2{
            color: white;
            position: absolute;
            font-family: Arial, Helvetica, sans-serif;
            bottom: 90px;
            left: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo.jpg" alt="">

        <p>The science of operations, as derived from mathematics<br>
        more especially, is a science of itself, and has<br>
        its own abstract truth and value</p>

        <h3 id="greeting">GOOD MORNING</h3>
        <h1 id="clock">00:00:00</h1>
        <h2>IN LONDON,UK</h2>

        <button>
            <a href="http://127.0.0.1:5500/index1.html">MORE</a>
        </button>
    </div>

    <script>
        function updateClock() {
            let now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            hours = minutes < 10 ? "0" + minutes:minutes;
            seconds = seconds < 10 ? "0" + seconds:seconds;

            document.getElementById('clock').innerHTML = 
            hours + ":" + minutes + ":" + seconds;
            let greeting = "";

            if (hours < 12){
                greeting = "GOOD MORNING,IT'S CURRENTLY";
            }
            else if(hours < 18){
                greeting = "GOOD AFTERNOON,IT;S CURRENTLY";
            }
            else{
                greeting = "GOOD EVENING,IT'S CURRENTLY";
            }
            document.getElementById("greeting").innerHTML = greeting;
        }
        setInterval(updateClock,1000);
        updateClock();
    </script>
</body>
</html>
